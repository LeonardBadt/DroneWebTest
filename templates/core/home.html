{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    /* Hero Image */
    .hero-image {
        width: 100%;
        max-width: 960px;
        height: 60vh;
        min-height: 400px;
        background-image: url("https://pub-6df6a1656be8480d84c422b414012517.r2.dev/DDP.JPG");  /* Change this URL */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        margin: 0 auto;
    }

    .hero-overlay {
        background: rgba(0, 0, 0, 0.55);
        padding: 2.5rem 3rem;
        border-radius: 16px;
        max-width: 800px;
    }

    .hero-image h1 {
        font-size: 3.8rem;
        margin: 0 0 1rem 0;
        text-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }

    /*Video Carousel*/
    .video-carousel {
        position: relative;
        width: 100%;
        max-width: 960px;
        margin: 10rem auto 10rem auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10rem;
    }

    .video-stage {
        position: relative;
        width: min(780px, 80vw);
    }

    .video-card {
        position: absolute;
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;
        border: 1.5px solid var(--border);
        transition: all 0.6s cubic-bezier(0.77, 0, 0.18, 1);
        transform-origin: center center;
    }

    .video-card video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    
    .video-card-label {
      position: absolute;
      bottom: 14px;
      left: 14px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 100px;
      transition: opacity 0.3s;
    }


    /*Position States*/
    .video-card.pos-front {
      width: 70%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      z-index: 3;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,255,71,0.1);
      border-color: rgba(232,255,71,0.2);
      cursor: default;
    }

    .video-card.pos-front .video-card-label { opacity: 0.75; }
    
    .video-card.pos-right {
      width: 48%;
      top: 54%;
      left: 73%;
      transform: translate(-50%, -50%) rotate(4deg) scale(0.9);
      z-index: 1;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,255,71,0.1);
      border-color: rgba(232,255,71,0.2);
      cursor: default;
    }

    .video-card.video-card.pos-right:hover {
        filter: brightness(1.1);
        transform: translate(-50%, -50%) rotate(3deg) scale(1);
    }

    .video-card.pos-right .video-card-label { opacity: 0.75; }

    .video-card.pos-left {
      width: 48%;
      top: 54%;
      left: 23%;
      transform: translate(-50%, -50%) rotate(-4deg) scale(0.9);
      z-index: 1;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,255,71,0.1);
      border-color: rgba(232,255,71,0.2);
      cursor: default;
    }

    .video-card.video-card.pos-left:hover {
        filter: brightness(1.1);
        transform: translate(-50%, -50%) rotate(-4deg) scale(1);
    }

    .video-card.pos-left .video-card-label { opacity: 0.75; }

    /* ── Arrow buttons ── */
    .arrow-controls {
        display: flex;
        gap: 16rem;
        align-items: center;
    }
    
    .arrow-btn {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      z-index: 10;
    }
 
    .arrow-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      transform: scale(1.1);
    }
 
    .arrow-btn svg { width: 22px; height: 22px; pointer-events: none; }

</style>

<div class="hero-image">
    <div class="hero-overlay">
        <h1>Desert Drone Photography</h1>
    </div>
</div>

<div class="video-carousel">

    <div class="video-stage">
        <div class="video-card pos-front" id="card-0" data-index="0" onclick="bringToFront(0)">
            <video autoplay loop muted playsinline>
                <source src="https://pub-6df6a1656be8480d84c422b414012517.r2.dev/DroneCinematic.mp4" type="video/mp4">
            </video>
            <div class="video-card-label">Cinematic Shots</div>
        </div>
        <div class="video-card pos-right" id="card-1" data-index="1" onclick="bringToFront(1)">
            <video autoplay loop muted playsinline>
                <source src="https://pub-6df6a1656be8480d84c422b414012517.r2.dev/HousePanShots.mp4" type="video/mp4">
            </video>
            <div class="video-card-label">Real Estate</div>
        </div>
        <div class="video-card pos-left" id="card-2" data-index="2" onclick="bringToFront(2)">
            <video autoplay loop muted playsinline>
                <source src="https://pub-6df6a1656be8480d84c422b414012517.r2.dev/LandSurveyLoop.mp4" type="video/mp4">
            </video>
            <div class="video-card-label">Land Surveys</div>
        </div>
    </div>

    <div class="arrow-controls">
        <button class="arrow-btn" onclick="rotateCW()" title="Left Button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>

        <button class="arrow-btn" onclick="rotateCCW()" title="Right Button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </div>

</div>

<script>
    let slots = [0,1,2];
    const CLASSES = ['pos-front', 'pos-right', 'pos-left'];
    const cards = [document.getElementById('card-0'),document.getElementById('card-1'),document.getElementById('card-2'),];

    function applySlots() {
        cards.forEach((card,i) => {
            card.className = 'video-card ' + CLASSES[slots[i]]
        });
        const frontCard = slots.indexOf(0);
    }

    function bringToFront(cardIndex) {
        if (slots[cardIndex] == 0) return;
        const currentFront = slots.indexOf(0);
        const vacatedSlot = slots[cardIndex];
        slots[currentFront] = vacatedSlot;
        slots[cardIndex] = 0;
        applySlots();
    }

    function rotateCW() {
        const newSlots = [0, 0, 0];
        for(let i = 0; i < 3; i++) {
            newSlots[i] = (slots[i] + 2) % 3;
        }
        slots = newSlots;
        applySlots()
    }

    function rotateCCW() {
        const newSlots = [0, 0, 0];
        for(let i = 0; i < 3; i++) {
            newSlots[i] = (slots[i] + 1) % 3;
        }
        slots = newSlots;
        applySlots()
    }
</script>
{% endblock %}
