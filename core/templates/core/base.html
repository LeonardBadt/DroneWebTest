{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Drone</title>
<style>
    .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #726565;
            z-index: 9999;
            transform: translateY(100%);           /* Start from bottom */
            animation: slideUpAndOut 1.5s ease-in-out forwards;
            pointer-events: none;

            /* Center the image inside */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-transition img {
            width: 300px;      /* adjust size as needed */
            height: auto;
    }

        @keyframes slideUpAndOut {
            0% {
                transform: translateY(100%);      /* Starts at bottom */
            }
            50% {
                transform: translateY(0);         /* Covers the whole screen */
            }
            100% {
                transform: translateY(-100%);     /* Leaves through the top */
            }
        }

    @keyframes pageLoad {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #fff;
        margin: 0;
        padding: 0;

        /* Page Load Animation */
        opacity: 0;
        transform: translateY(30px);     /* starts slightly below */
        animation: pageLoad 2s ease forwards;
    }

    /* Hero Image */
    .hero-image {
        height: 60vh;
        min-height: 400px;
        background-image: url("https://pub-6df6a1656be8480d84c422b414012517.r2.dev/DDP.JPG");  /* Change this URL */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .hero-overlay {
        background: rgba(0, 0, 0, 0.55);
        padding: 2.5rem 3rem;
        border-radius: 16px;
        max-width: 800px;
    }

    .hero-image h1 {
        font-size: 3.8rem;
        margin: 0 0 1rem 0;
        text-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }

    .hero-image p {
        font-size: 1.4rem;
        margin: 0;
        opacity: 0.95;
    }

    /* Gallery Styles */
    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
    }

    .gif-card {
        background: #1f1f1f;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .gif-card:hover {
        transform: scale(1.05);
    }

    .gif-card img {
        width: 100%;
        height: auto;
        display: block;
    }

    .gif-info {
        padding: 1rem;
    }

    .gif-info h3 {
        margin: 0 0 0.5rem 0;
        font-size: 1.2rem;
    }

    .upload-date {
        font-size: 0.85rem;
        color: #aaa;
    }
/* Video Showcase Grid */
.video-grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1rem;
}

.video-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
    align-items: center;
    margin-bottom: 4.5rem;
}

.text-box {
    padding: 1.5rem;
}

.text-box h3 {
    font-size: 1.9rem;
    margin-bottom: 1rem;
    color: #fff;
}

.text-box p {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #ddd;
}

.video-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
    background: #000;
}

.video-box video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
}

/* Responsive Design */
@media (max-width: 768px) {
    .video-row {
        grid-template-columns: 1fr;
        gap: 2rem;
        margin-bottom: 3.5rem;
    }
    
    .text-box {
        padding: 0.5rem 0;
    }
}
</style>
</head>
<body>
    <div class="page-transition">
        <img src="https://pub-6df6a1656be8480d84c422b414012517.r2.dev/DroneLogoTransparent.png" alt="logo">
    </div>
    <!--<header>
        <h1>🎥 GIF Gallery</h1>
        <p>Endless entertainment in one place</p>
    </header>-->


    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
